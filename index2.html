<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        input[type="text"] {
            width: 85%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        #qrcode {
            margin: 25px 0; /* Margin top and bottom to create spacing */
            display: flex;
            justify-content: center;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-generate {
            background-color: #007bff;
            color: white;
        }
        .btn-generate:hover {
            background-color: #0056b3;
        }
        .btn-download {
            background-color: #28a745;
            color: white;
        }
        .btn-download:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Code Generator</h2>
    
    <input type="text" id="text-input" placeholder="Enter URL or text here" value="https://www.mtib.gov.my">
    
    <div id="qrcode"></div>
    
    <div class="btn-group">
        <button class="btn-generate" onclick="generateQR()">Generate</button>
        <button class="btn-download" onclick="downloadQR()">Download PNG</button>
    </div>
</div>

<script>
    const qrContainer = document.getElementById("qrcode");
    
    // Initialize the QR Code instance
    const qrcode = new QRCode(qrContainer, {
        width: 250,
        height: 250,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    // Updates the existing QR code graphic
    function generateQR() {
        const inputData = document.getElementById("text-input").value;
        if (inputData.trim() === "") {
            alert("Please enter some text or a URL!");
            return;
        }
        qrcode.makeCode(inputData);
    }

    // Handles downloading the generated graphic
    function downloadQR() {
        const qrImage = qrContainer.querySelector("img");
        
        if (qrImage && qrImage.src) {
            const downloadLink = document.createElement("a");
            downloadLink.href = qrImage.src;
            downloadLink.download = "qrcode.png";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        } else {
            alert("QR Code image not found. Please try generating it again.");
        }
    }

    // Generate a default QR code right away when the page loads
    generateQR();
</script>

</body>
</html>
